services:
  # ===== AMD64 =====
  ros-humble-docker:
    build: .
    image: cuda12.9.1:humble-uv-nvm
    container_name: ros-humble-docker
    privileged: true
    tty: true
    network_mode: host
    ipc: host
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - .:/root/ros-humble-docker
      - /tmp/.X11-unix:/tmp/.X11-unix

  ros-humble-docker-gpu:
    extends:
      service: ros-humble-docker
    container_name: ros-humble-docker1-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute, graphics]
    profiles:
      - gpu

  # ===== Jetson ARM64 =====
  ros-humble-docker-jetson:
    build:
      args:
        BASE_IMAGE: dustynv/cudnn:8.9-r36.2.0
    image: cudnn8.9-jetson:humble-uv-nvm
    container_name: ros-humble-docker-jetson
    runtime: nvidia
    privileged: true
    tty: true
    network_mode: host
    ipc: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - .:/root/ros-humble-docker
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /tmp/argus_socket:/tmp/argus_socket
    profiles:
      - jetson
