services:
  # ===== AMD64 =====
  ros-humble-docker:
    image: cuda12.9.1:humble-uv-nvm
    build: .
    container_name: ros-humble-docker
    volumes:
      - .:/root/ros-humble-docker
      - /tmp/.X11-unix:/tmp/.X11-unix
      - uv-cache:/root/.cache/uv
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
    network_mode: host
    working_dir: /root/ros-humble-docker
    ipc: host
    privileged: true
    tty: true

  ros-humble-docker-gpu:
    container_name: ros-humble-docker-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility, compute, graphics]
    extends:
      service: ros-humble-docker
    profiles:
      - gpu

  # ===== Jetson ARM64 =====
  ros-humble-docker-jetson:
    image: cudnn8.9-jetson:humble-uv-nvm
    build:
      args:
        BASE_IMAGE: dustynv/cudnn:8.9-r36.2.0
    container_name: ros-humble-docker-jetson
    volumes:
      - .:/root/ros-humble-docker
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /tmp/argus_socket:/tmp/argus_socket
      - ~/.Xauthority:/root/.Xauthority
      - uv-cache:/root/.cache/uv
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/root/.Xauthority
    network_mode: host
    working_dir: /root/ros-humble-docker
    ipc: host
    privileged: true
    profiles:
      - jetson
    runtime: nvidia
    tty: true

volumes:
  uv-cache: